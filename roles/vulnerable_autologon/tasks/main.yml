---
# roles/vulnerable_autologon/tasks/main.yml

- name: Create domain user helpdesk_svc in Active Directory
  ansible.windows.win_shell: |
    Import-Module ActiveDirectory
    $user = Get-ADUser -Filter "SamAccountName -eq 'helpdesk_svc'" -ErrorAction SilentlyContinue
    if (-not $user) {
        $password = ConvertTo-SecureString "S3cur3P@ssw0rd!2026" -AsPlainText -Force
        New-ADUser -Name "helpdesk_svc" -SamAccountName "helpdesk_svc" -AccountPassword $password -Enabled $true -PasswordNeverExpires $true -Path "CN=Users,DC=corp,DC=local"
        Write-Output "User helpdesk_svc created successfully"
    } else {
        Write-Output "User helpdesk_svc already exists"
    }
  delegate_to: dc01-prod
  register: user_creation
  changed_when: "'created successfully' in user_creation.stdout"
  tags: autologon

- name: Inject AutoAdminLogon key into registry
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon
    name: AutoAdminLogon
    data: "1"
    type: string
    state: present
  tags: autologon

- name: Inject DefaultUserName key into registry
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon
    name: DefaultUserName
    data: "helpdesk_svc"
    type: string
    state: present
  tags: autologon

- name: Inject DefaultPassword key into registry
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon
    name: DefaultPassword
    data: "S3cur3P@ssw0rd!2026"
    type: string
    state: present
  tags: autologon

- name: Inject DefaultDomainName key into registry
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon
    name: DefaultDomainName
    data: "corp"
    type: string
    state: present
  tags: autologon

- name: Add helpdesk_svc to local Remote Desktop Users group
  ansible.windows.win_group_membership:
    name: Remote Desktop Users
    members:
      - corp\helpdesk_svc
    state: present
  tags: autologon

- name: Add helpdesk_svc to local Remote Management Users group
  ansible.windows.win_group_membership:
    name: Remote Management Users
    members:
      - corp\helpdesk_svc
    state: present
  tags: autologon
